<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="index, follow">

<meta name="google-site-verification" content="II21PQDDn5AwkWgYcovjVcDu6CI7IRK8gsXeGJmuEc0" />

<meta name="description" content="Bubble craps simulator that lets you test betting strategies and bankroll survival using simulated dice rolls." />

<title>Bubble Craps Simulator | CashCal</title>

<link rel="stylesheet" href="style.css">
  
  <title>Bubble Craps Simulator</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      background:#1b1b1b;
      color:white;
    }

    .chip-row{
      display:flex;
      justify-content:center;
      gap:12px;
      margin:20px 0;
      flex-wrap:wrap;
    }

    .chip{
      width:64px;
      cursor:pointer;
      transition:transform .15s;
    }

    .chip:hover{
      transform:scale(1.1);
    }

    button{
      padding:10px 20px;
      font-size:16px;
      margin:10px;
      cursor:pointer;
      border:none;
      border-radius:6px;
    }

    .roll-btn{
      background:#2e8b57;
      color:white;
    }

    .reset-btn{
      background:#444;
      color:white;
    }

    .results{
      margin-top:25px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="blackjack-bankroll-calculator.html" class="active">Blackjack</a>
    <a href="blackjack-strategy.html">Blackjack Strategy</a>
    <a href="blackjack-game.html">Blackjack Training Game</a>
    <a href="bubble-craps.html">Bubble Craps</a>
  </div>

  <audio id="chipSound" src="sounds/chip-click.mp3" preload="auto"></audio>

  <h1>Bubble Craps Simulator</h1>

  <p>
    Test common craps bets and see how your bankroll changes.
  </p>

  <div class="chip-row">
    <img src="images/chips/chip-1.png" class="chip" data-value="1" alt="$1 chip">
    <img src="images/chips/chip-5.png" class="chip" data-value="5" alt="$5 chip">
    <img src="images/chips/chip-10.png" class="chip" data-value="10" alt="$10 chip">
    <img src="images/chips/chip-25.png" class="chip" data-value="25" alt="$25 chip">
    <img src="images/chips/chip-100.png" class="chip" data-value="100" alt="$100 chip">
  </div>

  <h3>Current Bet: $<span id="betTotal">0</span></h3>

  <button id="rollBtn" class="roll-btn">Roll Dice</button>
  <button id="resetGame" class="reset-btn">Reset Game</button>

  <div class="results">
    <h3>Results</h3>
    <p>Dice Roll: <span id="diceResult">-</span></p>
    <p>Bankroll: $<span id="bankroll">100</span></p>
  </div>

  <script src="bubble-craps.js"></script>
</body>
</html>
