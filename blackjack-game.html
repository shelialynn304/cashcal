<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack Trainer</title>

<style>

body{
margin:0;
padding:0;
background:
radial-gradient(circle at top,#0f7a3a 0%,#0a5c2b 55%,#073d1d 100%),
repeating-linear-gradient(
45deg,
rgba(255,255,255,0.02),
rgba(255,255,255,0.02) 2px,
transparent 2px,
transparent 4px
);
font-family:Arial,sans-serif;
color:white;
text-align:center;
min-height:100vh;
overflow:hidden;
}

.wrap{
max-width:1100px;
height:100vh;
margin:0 auto;
padding:8px 14px;
display:flex;
flex-direction:column;
justify-content:space-between;
box-sizing:border-box;
}

h1{
margin:4px 0 2px;
font-size:1.8rem;
}

.topbar{
display:flex;
justify-content:center;
gap:18px;
margin:4px 0;
font-weight:bold;
}

.trainer-stats{
font-size:.9rem;
opacity:.9;
margin-bottom:4px;
}

.message{
min-height:18px;
margin:2px 0 4px;
font-size:.9rem;
}

.table-area{
background:radial-gradient(circle,#0c6b35 0%,#084d26 70%,#053319 100%);
border:4px solid #d4af37;
border-radius:30px;
padding:12px;
box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 10px 25px rgba(0,0,0,.5);
display:flex;
flex-direction:column;
flex:1;
}

.section-title{
font-size:1rem;
margin:2px 0;
}

.total{
font-size:.9rem;
}

.hand{
min-height:80px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:0;
}

.hand img{
margin-left:-25px;
}

.hand img:first-child{
margin-left:0;
}

.card{
width:65px;
border-radius:8px;
box-shadow:0 6px 12px rgba(0,0,0,.6);
opacity:0;
transform:translateY(-30px) scale(.9);
animation:dealCard .35s ease forwards;
}

@keyframes dealCard{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.bet-spot{
height:40px;
width:140px;
margin:4px auto;
border:2px dashed rgba(255,255,255,.4);
border-radius:40px;
background:rgba(0,0,0,.15);
position:relative;
display:flex;
justify-content:center;
align-items:flex-end;
}

.bet-spot::before{
content:"BET";
position:absolute;
top:-10px;
font-size:.6rem;
letter-spacing:2px;
opacity:.5;
}

.bet-chip{
width:34px;
position:absolute;
}

.chips{
display:flex;
justify-content:center;
gap:8px;
margin-top:4px;
}

.chip{
width:40px;
cursor:pointer;
}

.controls{
margin-top:4px;
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
font-size:.85rem;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

#dealBtn{background:#1f7ae0}
#hitBtn{background:#21a35b}
#standBtn{background:#d64545}
#doubleBtn{background:#8b5cf6}
#splitBtn{background:#f59e0b}
#clearBetBtn{background:#6b7280}

button:disabled{
opacity:.5;
cursor:not-allowed;
}


.strategy-popup{
  position: fixed;
  top: 90px;
  right: 14px;
  width: 320px;
  background: #111;
  border: 2px solid #ffd54a;
  border-radius: 14px;
  z-index: 9999;
  text-align: left;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,.45);
}

.strategy-header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  background: rgba(255,213,74,.15);
}

.strategy-body{
  padding: 10px;
}

.strategy-move{
  font-weight: bold;
  margin-bottom: 4px;
}

.strategy-move.hit{ color:#61d96b; }
.strategy-move.stand{ color:#ff6b6b; }
.strategy-move.double{ color:#67b7ff; }
.strategy-move.split{ color:#d48cff; }

.hidden{
  display: none;
}

.wrong-bubble{
position:fixed;
left:50%;
top:18%;
transform:translateX(-50%);
background:#d11;
font-weight:900;
font-size:2rem;
padding:14px 24px;
border-radius:16px;
z-index:1000;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.wrong-bubble.show{
animation:wrongPop .25s ease,wrongFloat 1.2s ease forwards;
}

@keyframes wrongPop{
0%{opacity:0;transform:translateX(-50%) scale(.6)}
100%{opacity:1;transform:translateX(-50%) scale(1)}
}

@keyframes wrongFloat{
0%{opacity:1}
100%{opacity:0;top:12%}
}

</style>
</head>

<body>

<div class="wrap">

<h1>Blackjack Trainer</h1>

<div class="topbar">
<div>Bankroll: $<span id="bankroll">1000</span></div>
<div>Bet: $<span id="bet">0</span></div>
</div>

<div class="trainer-stats">
Correct: <span id="correctMoves">0</span> |
Mistakes: <span id="wrongMoves">0</span> |
Accuracy: <span id="accuracy">100</span>%
</div>

<div id="message" class="message">Place a bet.</div>

<div class="table-area">

<div class="section-title">Dealer</div>
<div class="total">Total: <span id="dealer-total">0</span></div>
<div id="dealer-hand" class="hand"></div>

<div id="betSpot" class="bet-spot"></div>

<div class="section-title">Player</div>
<div class="total">Total: <span id="player-total">0</span></div>
<div id="player-hand" class="hand"></div>

<div class="chips">
<img src="images/chips/chip-1.png" class="chip" data-amount="1">
<img src="images/chips/chip-5.png" class="chip" data-amount="5">
<img src="images/chips/chip-10.png" class="chip" data-amount="10">
<img src="images/chips/chip-25.png" class="chip" data-amount="25">
<img src="images/chips/chip-100.png" class="chip" data-amount="100">
</div>

<div class="controls">
<button id="dealBtn">Deal</button>
<button id="hitBtn" disabled>Hit</button>
<button id="standBtn" disabled>Stand</button>
<button id="doubleBtn" disabled>Double</button>
<button id="splitBtn" disabled>Split</button>
<button id="clearBetBtn">Clear Bet</button>
</div>

</div>
</div>

<div id="wrongBubble" class="wrong-bubble hidden">WRONG!</div>

<div id="strategyPopup" class="strategy-popup hidden">
<div class="strategy-header">
<div>Strategy Coach</div>
<button id="strategyClose">✖</button>
</div>
<div class="strategy-body">
<div id="strategyMove" class="strategy-move">HIT</div>
<div id="strategyText"></div>
</div>
</div>

<audio id="chipSound" src="sounds/chip-click.mp3"></audio>

<script>

let deck=[]
let player=[]
let dealer=[]
let bankroll=1000
let bet=0
let gameOver=true

let correctMoves=0
let wrongMoves=0
let lastStrategyMove=null

const bankrollEl=document.getElementById("bankroll")
const betEl=document.getElementById("bet")
const dealerHandEl=document.getElementById("dealer-hand")
const playerHandEl=document.getElementById("player-hand")
const dealerTotalEl=document.getElementById("dealer-total")
const playerTotalEl=document.getElementById("player-total")
const messageEl=document.getElementById("message")
const chipSound=document.getElementById("chipSound")

const dealBtn=document.getElementById("dealBtn")
const hitBtn=document.getElementById("hitBtn")
const standBtn=document.getElementById("standBtn")
const doubleBtn=document.getElementById("doubleBtn")
const splitBtn=document.getElementById("splitBtn")
const clearBetBtn=document.getElementById("clearBetBtn")

const chipEls=document.querySelectorAll(".chip")
const betSpot=document.getElementById("betSpot")

const correctMovesEl=document.getElementById("correctMoves")
const wrongMovesEl=document.getElementById("wrongMoves")
const accuracyEl=document.getElementById("accuracy")

const strategyPopup=document.getElementById("strategyPopup")
const strategyMoveEl=document.getElementById("strategyMove")
const strategyTextEl=document.getElementById("strategyText")
const strategyCloseBtn=document.getElementById("strategyClose")
let strategyTimer=null

  strategyCloseBtn.addEventListener("click",()=>{
  strategyPopup.classList.add("hidden")
  clearTimeout(strategyTimer)
})

const wrongBubble=document.getElementById("wrongBubble")

function showWrong(){
wrongBubble.classList.remove("hidden")
wrongBubble.classList.add("show")
setTimeout(()=>{
wrongBubble.classList.add("hidden")
wrongBubble.classList.remove("show")
},1200)
}

function updateAccuracy(){
let total=correctMoves+wrongMoves
let acc=total?Math.round((correctMoves/total)*100):100
correctMovesEl.textContent=correctMoves
wrongMovesEl.textContent=wrongMoves
accuracyEl.textContent=acc
}

function checkMove(action){
  if(!lastStrategyMove) return

  if(action === lastStrategyMove){
    correctMoves++
    showCorrect()
  }else{
    wrongMoves++
    showWrong()
  }

  updateAccuracy()
}
  
function setMessage(t){messageEl.textContent=t}

function updateMoney(){
bankrollEl.textContent=bankroll
betEl.textContent=bet
}

function buildDeck(){
const suits=["spades","hearts","diamonds","clubs"]
const ranks=["A","02","03","04","05","06","07","08","09","10","J","Q","K"]
deck=[]
for(let s of suits)
for(let r of ranks)
deck.push({suit:s,rank:r})
}


function shuffle(){
for(let i=deck.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
;[deck[i],deck[j]]=[deck[j],deck[i]]
}
}

function draw(){return deck.pop()}

function cardValue(r){
if(r==="A")return 11
if(["K","Q","J"].includes(r))return 10
return parseInt(r)
}

function handValue(h){
let total=0
let aces=0
for(let c of h){
total+=cardValue(c.rank)
if(c.rank==="A")aces++
}
while(total>21&&aces){
total-=10
aces--
}
return total
}

function renderHand(hand,el,hideHole=false){
el.innerHTML=""

hand.forEach((c,i)=>{
let img=document.createElement("img")
img.className="card"

if(hideHole && i===1){
img.src="images/cards/card_back.png"
}else{
img.src=`images/cards/card_${c.suit}_${c.rank}.png`
}

img.style.animationDelay=`${i*.15}s`
el.appendChild(img)
})
}
  
function render(showDealer=false){
renderHand(player,playerHandEl,false)
renderHand(dealer,dealerHandEl,!showDealer)
playerTotalEl.textContent=handValue(player)
dealerTotalEl.textContent=showDealer
  ? handValue(dealer)
  : cardValue(dealer[0].rank)
}
  
  
function showCorrect(){
let bubble=document.createElement("div")
bubble.className="wrong-bubble"
bubble.style.background="#2e9e44"
bubble.textContent="CORRECT!"
document.body.appendChild(bubble)

setTimeout(()=>bubble.remove(),900)
}
  

function updateButtons(){
dealBtn.disabled=!gameOver
hitBtn.disabled=gameOver
standBtn.disabled=gameOver
doubleBtn.disabled=gameOver||player.length!==2||bankroll<bet
splitBtn.disabled=true
clearBetBtn.disabled=!gameOver||bet===0
}

  function playChipSound(){
  if(!chipSound) return
  chipSound.pause()
  chipSound.currentTime=0
  chipSound.play().catch(()=>{})
}

  function getMoveClass(move){
  return move.toLowerCase()
}

function showStrategyPopup(move,text){
  lastStrategyMove=move
  strategyMoveEl.textContent=move.toUpperCase()
  strategyMoveEl.className=`strategy-move ${getMoveClass(move)}`
  strategyTextEl.textContent=text
  strategyPopup.classList.remove("hidden")

  clearTimeout(strategyTimer)
  strategyTimer=setTimeout(()=>{
    strategyPopup.classList.add("hidden")
  },12000)
}

function hideStrategyPopup(){
  strategyPopup.classList.add("hidden")
  clearTimeout(strategyTimer)
}

  
function normalizeRank(rank){
  if(["J","Q","K"].includes(rank)) return "10"
  if(rank==="A") return "A"
  return String(parseInt(rank,10))
}

function isSoftHand(hand){
  let total=0
  let aces=0

  for(const card of hand){
    total+=cardValue(card.rank)
    if(card.rank==="A") aces++
  }

  while(total>21 && aces>0){
    total-=10
    aces--
  }

  return hand.some(card=>card.rank==="A") && total<=21
}

function isPair(hand){
  return hand.length===2 &&
    normalizeRank(hand[0].rank)===normalizeRank(hand[1].rank)
}

function getBasicStrategy(playerHand,dealerCard){
  const total=handValue(playerHand)
  const dealerUp=cardValue(dealerCard.rank)
  const soft=isSoftHand(playerHand)
  const pair=isPair(playerHand)

  if(pair){
    const pairRank=normalizeRank(playerHand[0].rank)

    if(pairRank==="A" || pairRank==="8") return "Split"
    if(pairRank==="10") return "Stand"
    if(pairRank==="9") return [2,3,4,5,6,8,9].includes(dealerUp) ? "Split" : "Stand"
    if(pairRank==="7") return dealerUp>=2 && dealerUp<=7 ? "Split" : "Hit"
    if(pairRank==="6") return dealerUp>=2 && dealerUp<=6 ? "Split" : "Hit"
    if(pairRank==="5") return dealerUp>=2 && dealerUp<=9 ? "Double" : "Hit"
    if(pairRank==="4") return (dealerUp===5 || dealerUp===6) ? "Split" : "Hit"
    if(pairRank==="3" || pairRank==="2") return dealerUp>=2 && dealerUp<=7 ? "Split" : "Hit"
  }

  if(soft){
    if(total===13 || total===14) return (dealerUp===5 || dealerUp===6) ? "Double" : "Hit"
    if(total===15 || total===16) return (dealerUp>=4 && dealerUp<=6) ? "Double" : "Hit"
    if(total===17) return (dealerUp>=3 && dealerUp<=6) ? "Double" : "Hit"

    if(total===18){
      if(dealerUp>=3 && dealerUp<=6) return "Double"
      if([2,7,8].includes(dealerUp)) return "Stand"
      return "Hit"
    }

    if(total>=19) return "Stand"
  }

  if(total<=8) return "Hit"
  if(total===9) return (dealerUp>=3 && dealerUp<=6) ? "Double" : "Hit"
  if(total===10) return (dealerUp>=2 && dealerUp<=9) ? "Double" : "Hit"
  if(total===11) return dealerUp===11 ? "Hit" : "Double"
  if(total===12) return (dealerUp>=4 && dealerUp<=6) ? "Stand" : "Hit"
  if(total>=13 && total<=16) return (dealerUp>=2 && dealerUp<=6) ? "Stand" : "Hit"
  return "Stand"
}

function getStrategyExplanation(playerHand,dealerCard){
  const move=getBasicStrategy(playerHand,dealerCard)
  const total=handValue(playerHand)
  const dealerLabel=normalizeRank(dealerCard.rank)

  let handLabel=`${total}`
  if(isPair(playerHand)) handLabel=`pair of ${normalizeRank(playerHand[0].rank)}s`
  else if(isSoftHand(playerHand)) handLabel=`soft ${total}`

  return {
    move,
    text:`You have ${handLabel} vs dealer ${dealerLabel}. Basic strategy says: ${move}.`
  }
}

function maybeShowStrategy(){
  if(gameOver) return
  if(player.length<2 || dealer.length<1) return

  const advice=getStrategyExplanation(player,dealer[0])
  showStrategyPopup(advice.move,advice.text)
}

  
function addBet(a){
if(!gameOver)return
if(bankroll<a)return
bankroll-=a
bet+=a
  playChipSound()
updateMoney()
let chip=document.createElement("img")
chip.src=`images/chips/chip-${a}.png`
chip.className="bet-chip"
chip.style.bottom=`${betSpot.children.length*4}px`
betSpot.appendChild(chip)
}

function clearBet(){
bankroll+=bet
bet=0
betSpot.innerHTML=""
updateMoney()
}

function deal(){
if(bet<=0){setMessage("Place bet");return}
buildDeck()
shuffle()
player=[draw(),draw()]
dealer=[draw(),draw()]
gameOver=false
render()
updateButtons()
setMessage("Your move")
maybeShowStrategy()
}

function hit(){
  if(gameOver) return

  checkMove("Hit")
  player.push(draw())
  render()

  if(handValue(player) > 21){
    bet = 0
    gameOver = true
    hideStrategyPopup()
    updateMoney()
    updateButtons()
    setMessage("Bust")
    return
  }

  if(handValue(player) === 21){
    stand()
    return
  }

  setMessage("Hit or stand?")
  maybeShowStrategy()
}

function showImage(src){
  let img=document.createElement("img")
  img.src=src
  img.style.position="fixed"
  img.style.left="50%"
  img.style.top="40%"
  img.style.transform="translate(-50%,-50%)"
  img.style.zIndex="2000"
  img.style.width="260px"

  document.body.appendChild(img)

  setTimeout(()=>img.remove(),1800)
}  

function stand(){
if(gameOver) return

checkMove("Stand")

while(handValue(dealer) < 17){
  dealer.push(draw())
}

render(true)

let pt = handValue(player)
let dt = handValue(dealer)

if(dt > 21 || pt > dt){
  bankroll += bet * 2
  setMessage("You win")
}
else if(pt === dt){
  bankroll += bet
  setMessage("Push")
}
else{
  setMessage("Dealer wins")
}

bet = 0
gameOver = true

hideStrategyPopup()

updateMoney()
updateButtons()
}
  
function doubleDown(){
checkMove("Double")
if(bankroll<bet)return
bankroll-=bet
bet*=2
player.push(draw())
render()
stand()
}

chipEls.forEach(c=>{
c.onclick=()=>addBet(Number(c.dataset.amount))
})

dealBtn.onclick=deal
hitBtn.onclick=hit
standBtn.onclick=stand
doubleBtn.onclick=doubleDown
splitBtn.onclick=()=>setMessage("Split coming soon")
clearBetBtn.onclick=clearBet

updateMoney()
updateButtons()
render()

</script>

</body>
</html>
